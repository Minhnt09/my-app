<div class="min-h-screen flex flex-col items-center justify-center bg-[#F7EBE4] font-arima p-6">
  <div class="bg-white rounded-2xl shadow-lg p-10 max-w-lg text-center">

    <h1 class="text-3xl font-bold text-[#AE8989] mb-3">Thanh toán thành công!</h1>

    <ng-container *ngIf="order; else loading">
      <p class="text-lg mb-4">Mã đơn hàng của bạn:</p>
      <p class="text-2xl font-semibold text-green-600">{{ order?.orderCode }}</p>
    </ng-container>

    <ng-template #loading>
      <p class="text-lg mb-4">Đang lấy thông tin đơn hàng...</p>
      <p class="text-sm text-gray-500">OrderCode: {{ orderCode }}</p>
    </ng-template>

    <button
      class="mt-8 bg-[#AE8989] text-white px-10 py-3 rounded-full text-lg hover:opacity-90 transition"
      routerLink="/home">
      Về trang chủ
    </button>
  </div>
</div>
